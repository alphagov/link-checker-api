version: 2
updates:
  - package-ecosystem: bundler
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 3
    groups:
      test:
        patterns:
          - "climate_control"
          - "database_cleaner"
          - "factory_bot*"
          - "pact*"
          - "rspec-*"
          - "simplecov"
          - "timecop"
          - "webmock"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 3
