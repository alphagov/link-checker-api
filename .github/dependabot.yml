version: 2
updates:
  - package-ecosystem: bundler
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "07:00"
    allow:
      - dependency-type: direct
    cooldown:
      default-days: 3
    open-pull-requests-limit: 25
    groups:
      test:
        patterns:
          - "climate_control"
          - "database_cleaner"
          - "factory_bot*"
          - "pact*"
          - "rspec-*"
          - "simplecov"
          - "timecop"
          - "webmock"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "07:00"
    cooldown:
      default-days: 3
    open-pull-requests-limit: 25
